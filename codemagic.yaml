workflows:
  android-apk:
    name: Android APK Build
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build React app
        script: |
          cd frontend
          npm install
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
