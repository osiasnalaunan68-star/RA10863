workflows:
  android-apk:
    name: CMTA Android APK
    max_build_duration: 60
    environment:
      node: 22
      java: 17
    triggering:
      events:
        - push
    scripts:
      - name: Install root deps
        script: npm install
      - name: Install and build frontend
        script: |
          cd frontend
          npm install
          npm run build
      - name: Sync Capacitor android
        script: npx --no-install cap sync android
      - name: Set Android SDK
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $CM_ENV
      - name: Make gradlew executable
        script: chmod +x android/gradlew
      - name: Show SDK platforms (debug)
        script: ls -la $ANDROID_SDK_ROOT/platforms || echo "No platforms"
      - name: Build debug APK (with clean and info)
        script: |
          cd android
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - android/app/build/outputs/**/*.apk
